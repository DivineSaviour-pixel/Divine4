<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST 311 | Year 3 Practice Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f1f5f9; }

        @keyframes emeraldGlow {
            0%, 100% { border-color: #1e293b; box-shadow: 0 0 0px rgba(16, 185, 129, 0); }
            50% { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        }
        .login-card { animation: emeraldGlow 4s infinite; border-width: 2px; }

        .marquee-bg {
            background: linear-gradient(90deg, #064e3b, #10b981, #064e3b);
            border-bottom: 2px solid #34d399;
            overflow: hidden;
            white-space: nowrap;
            padding: 14px 0;
        }
        .marquee-text { display: inline-block; animation: scroll 30s linear infinite; font-weight: 700; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .opt-btn { background: #1e293b; border: 2px solid #334155; transition: all 0.2s ease; cursor: pointer; }
        .opt-btn:hover { border-color: #10b981; transform: scale(1.01); }
        .opt-active { background: #10b981 !important; border-color: #fff !important; color: #064e3b !important; font-weight: 900; }

        .status-done { background-color: #10b981 !important; color: #fff !important; border-color: #059669 !important; }
        .status-now { border-color: #fbbf24 !important; box-shadow: 0 0 10px #fbbf24; }

        .hidden { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="marquee-bg sticky top-0 z-50">
        <div class="marquee-text uppercase">
            🚀 GST 311 Year 3 Exam Preparation &nbsp;&nbsp;&nbsp;&nbsp; 🔗 Official CBT: cbt.uniyo.edu.ng &nbsp;&nbsp;&nbsp;&nbsp; 📧 Support: bsaviourokon@gmail.com
        </div>
    </div>

    <div id="login-view" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-900 p-10 rounded-[2rem] login-card max-w-md w-full text-center shadow-2xl">
            <h1 class="text-4xl font-black text-emerald-500 mb-2">GST 311</h1>
            <p class="text-slate-400 font-medium mb-8 italic">Divine4 Practice Portal</p>
            <div class="space-y-4">
                <input type="text" id="user-fullname" placeholder="Enter Full Name" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-emerald-500 text-white font-bold">
                <input type="text" id="user-reg" placeholder="Reg Number" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-emerald-500 text-white font-bold">
                <button onclick="startExam()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-emerald-950 font-black py-4 rounded-2xl transition-all shadow-lg text-lg">LOG IN</button>
            </div>
        </div>
    </div>

    <div id="exam-view" class="hidden flex-grow container mx-auto p-4 md:p-8">
        <div class="mb-6 flex flex-col md:flex-row justify-between items-center bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
            <div>
                <h2 class="text-2xl font-black text-white">Welcome, <span id="display-name" class="text-emerald-400 text-3xl">Student</span>!</h2>
                <p class="text-slate-400 font-bold text-sm uppercase tracking-widest" id="display-reg"></p>
            </div>
            <div class="mt-4 md:mt-0 bg-slate-800 px-8 py-3 rounded-2xl border-2 border-emerald-500/30">
                <span id="timer-clock" class="text-3xl font-black font-mono text-emerald-500">20:00</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="bg-slate-900 rounded-[2.5rem] p-8 md:p-12 border border-slate-800 shadow-2xl min-h-[500px] flex flex-col justify-between">
                    <div>
                        <span class="bg-emerald-500/10 text-emerald-500 px-4 py-2 rounded-full font-black text-sm uppercase">Question <span id="q-number">1</span> of 50</span>
                        <h3 id="q-content" class="text-xl md:text-2xl font-bold text-white leading-snug italic mt-8 mb-10">...</h3>
                        <div id="options-area" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                    <div class="flex justify-between mt-12 pt-8 border-t border-slate-800">
                        <button onclick="movePrev()" class="px-8 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 font-black">BACK</button>
                        <button onclick="moveNext()" class="px-10 py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-black">NEXT</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-xl">
                    <div id="nav-map" class="grid grid-cols-5 gap-2 max-h-[380px] overflow-y-auto pr-2 custom-scroll"></div>
                    <button onclick="finishProcess()" class="w-full mt-10 bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl">SUBMIT EXAM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-view" class="hidden flex-grow flex flex-col items-center p-4">
        <div class="bg-slate-900 p-12 rounded-[3rem] border-2 border-emerald-500 max-w-4xl w-full text-center shadow-2xl">
            <h2 class="text-5xl font-black text-white mb-4 uppercase">Grade Summary</h2>
            <div class="inline-block p-12 bg-emerald-500/10 rounded-full border-4 border-emerald-500 mb-10">
                <span id="score-val" class="text-7xl font-black text-emerald-500">0/50</span>
            </div>
            <div id="review-scroll" class="text-left space-y-4 max-h-[500px] overflow-y-auto mt-8 border-t border-slate-800 pt-8 custom-scroll"></div>
        </div>
    </div>

    <footer class="bg-slate-950 p-10 border-t border-slate-900 mt-auto">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10 items-center">
            <div class="flex items-center gap-4 justify-center md:justify-start">
                <div class="w-12 h-12 bg-red-500/10 rounded-xl flex items-center justify-center text-red-500 text-xl"><i class="fas fa-envelope"></i></div>
                <p class="text-white font-bold text-sm">bsaviourokon@gmail.com</p>
            </div>
            <div class="flex justify-center">
                <a href="https://wa.me/2349127396493" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-black flex items-center gap-3 transition-all">
                    <i class="fab fa-whatsapp text-2xl"></i><span>WHATSAPP SUPPORT</span>
                </a>
            </div>
            <div class="text-center md:text-right"><p class="text-emerald-500 font-bold">© 2026 Compiled by Saviour</p></div>
        </div>
    </footer>

    <script>
        const questions = [
            { q: "The word 'Conflict' is derived from the Latin word 'Confligere,' which means:", a: ["To agree", "To strike together", "To mediate", "To ignore"], c: 1 },
            { q: "Which type of conflict occurs within an individual, often involving internal struggle?", a: ["Interpersonal", "Intrapersonal", "Intragroup", "Intergroup"], c: 1 },
            { q: "The 'Human Relations' approach to conflict suggests that conflict is:", a: ["Always destructive", "Inevitable but can be managed", "Not inevitable", "Desirable for growth"], c: 1 },
            { q: "According to the Pluralist approach, conflict is seen as:", a: ["An abnormal occurrence", "Inevitable and even desirable", "Avoided at all costs", "A sign of poor leadership"], c: 1 },
            { q: "Which of these is a cause of conflict from an organizational perspective?", a: ["Healthy communication", "Ambiguity in responsibility", "Shared resources", "Clear jurisdiction"], c: 1 },
            { q: "Conflict management differs from conflict resolution because it focuses on:", a: ["Eliminating conflict entirely", "Limiting the negative aspects", "Ignoring parties", "Legal punishment"], c: 1 },
            { q: "The conflict strategy where one party ignores the dispute is called:", a: ["Accommodation", "Competition", "Avoidance", "Collaboration"], c: 2 },
            { q: "In the 'Compromise' strategy, the goal is to find:", a: ["A total winner", "A middle course where both sides concede", "Way to ignore", "Satisfy one party"], c: 1 },
            { q: "Negative Peace is defined as:", a: ["Presence of justice", "Absence of direct physical violence", "Presence of harmony", "Inner spiritual calm"], c: 1 },
            { q: "Positive Peace involves the absence of indirect violence and the presence of:", a: ["Large armies", "Social justice and equality", "Strong borders", "Wealthy politicians"], c: 1 },
            { q: "Which type of security protects computer networks and digital data?", a: ["Physical", "Financial", "Cyber Security", "National"], c: 2 },
            { q: "The WHO defines violence as the intentional use of physical force resulting in:", a: ["Wealth redistribution", "Injury, death, or psychological harm", "Only economic loss", "Treaties"], c: 1 },
            { q: "Language can act as a 'Peace Agent' when it is used to:", a: ["Repress minority", "Promote mutual understanding and unity", "Create 'Sinhala Only' laws", "Marginalize"], c: 1 },
            { q: "The 'Sinhala Only Act' of 1956 is an example of language used for:", a: ["Inclusion", "Marginalization and conflict", "Promoting English", "Ending war"], c: 1 },
            { q: "Primary goal of the Presidential Amnesty Programme (PAP) in Nigeria:", a: ["Increase oil prices", "Disarm and rehabilitate militants", "Build refineries", "Arrest protesters"], c: 1 },
            { q: "The Presidential Amnesty Programme was initiated by which President?", a: ["Obasanjo", "Yar'Adua", "Jonathan", "Buhari"], c: 1 },
            { q: "A major challenge facing the success of the Amnesty Programme is:", a: ["Lack of funding", "Corruption and mismanagement", "Too many jobs", "Lack of oil"], c: 1 },
            { q: "Negotiation is a process of communication used to:", a: ["Force a decision", "Reach agreement with shared/opposed interests", "Start lawsuit", "Avoid talking"], c: 1 },
            { q: "'Positional Negotiation' is often characterized by:", a: ["Soft behavior", "Aggressive and adversarial behavior", "Shared interests", "Win-Win"], c: 1 },
            { q: "BATNA stands for:", a: ["Best Alternative to a Negotiated Agreement", "Better Agreement", "Basic Alternative", "Best Action"], c: 0 },
            { q: "Mediation involves a third party who is:", a: ["Biased", "Neutral and helps reach agreement", "Authorized to penalize", "A judge"], c: 1 },
            { q: "Arbitration difference: the arbitrator:", a: ["Cannot make decision", "Renders a binding decision (award)", "Is family member", "Only listens"], c: 1 },
            { q: "The 'Multi-Door Court House' offers:", a: ["One way to solve", "Various ADR options (mediation/etc)", "Escape the law", "Only trials"], c: 1 },
            { q: "In 'Med-Arb', if mediation fails:", a: ["Dismissed", "Neutral becomes arbitrator and decides", "Go to war", "Start again"], c: 1 },
            { q: "'New Media' includes platforms like:", a: ["Traditional papers", "Facebook, X, YouTube", "AM Radio", "Letters"], c: 1 },
            { q: "Interactivity in New Media means:", a: ["Only watch", "Users engage, comment, and share", "Govt controlled", "Always anonymous"], c: 1 },
            { q: "'Peace Journalism' focuses on:", a: ["Sensationalism", "Root causes and promoting empathy", "Military reports", "Us vs Them"], c: 1 },
            { q: "Oil discovery in commercial quantities in 1956 at:", a: ["Warri", "Oloibiri", "Port Harcourt", "Bonny"], c: 1 },
            { q: "Environmental degradation in Niger Delta is caused by:", a: ["Overfarming", "Oil spills and gas flaring", "Desertification", "No rain"], c: 1 },
            { q: "Integrative Negotiation is also known as:", a: ["Zero-sum", "Interest-based/Win-Win", "Competitive", "Hard-ball"], c: 1 },
            { q: "Refugees crossed borders due to:", a: ["Job offers", "Well-founded fear of persecution", "Tourism", "Research"], c: 1 },
            { q: "IDPs are different from refugees because:", a: ["Wealthier", "Have not crossed international border", "Choose to leave", "Protected abroad"], c: 1 },
            { q: "Principle of 'Non-Refoulement' means:", a: ["Paid", "Not forced back to danger", "Moved yearly", "Closed borders"], c: 1 },
            { q: "NGOs role in 'Relief' during conflict:", a: ["Supply weapons", "Food, water, and healthcare", "Start parties", "Control police"], c: 1 },
            { q: "OECD-DAC criteria includes:", a: ["Speed/Cost", "Relevance, Effectiveness, Impact, etc", "Popularity", "Soldiers"], c: 1 },
            { q: "Dialogue as a tool aims at:", a: ["Winning", "Mutual understanding/relationships", "Signing fast", "Avoiding opponent"], c: 1 },
            { q: "Conciliation is often:", a: ["Arrest method", "Precursor/Softer mediation", "Military solution", "Tax method"], c: 1 },
            { q: "New York Convention (1958) importance:", a: ["Environment", "Enforcement of international arbitral awards", "Human rights", "Education"], c: 1 },
            { q: "Institutional Peace refers to:", a: ["Inner peace", "Right relationship with Govt/Org", "Church peace", "No stress"], c: 1 },
            { q: "Psychological cause of violence:", a: ["High GDP", "Media violence/copycat behavior", "Infrastructure", "Education"], c: 1 },
            { q: "What is 'Structural Violence'?", a: ["Physical fight", "Harm by unjust social/economic systems", "Disaster", "Accident"], c: 1 },
            { q: "Sinhala Only Act year:", a: ["1960", "1956", "1948", "1972"], c: 1 },
            { q: "The 'Ombudsman' is an official who:", a: ["Commands army", "Investigates complaints against authorities", "Writes news", "Arrests"], c: 1 },
            { q: "Transformation mediation focuses on:", a: ["Settling for money", "Empowerment and recognition", "Judge opinion", "Speed"], c: 1 },
            { q: "Conflict Transformation is deeper because it:", a: ["Short duration", "Addresses structures and relationships", "Uses force", "Costs more"], c: 1 },
            { q: "DDR strategy is used in:", a: ["Starting war", "Post-conflict peacebuilding", "Campaigns", "Space"], c: 1 },
            { q: "Niger Delta region covers approximately:", a: ["20k sq km", "112k sq km", "5k sq km", "500k sq km"], c: 1 },
            { q: "NOT a characteristic of mediation:", a: ["Voluntary", "Confidential", "Mediator imposes judgment", "Neutrality"], c: 2 },
            { q: "Facilitative Mediation mediator:", a: ["Legal advice", "Helps parties reach own solution", "Decides winner", "Forces handshake"], c: 1 },
            { q: "Goal of Peace Education:", a: ["Teaching fighting", "Foster culture of peace/non-violence", "Increase fees", "Discourage politics"], c: 1 }
        ];

        let index = 0; let selections = new Array(50).fill(null); let timer = 1200; let interval;

        function startExam() {
            const n = document.getElementById('user-fullname').value;
            const r = document.getElementById('user-reg').value;
            if(!n || !r) return alert("Please fill in your details!");
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('exam-view').classList.remove('hidden');
            document.getElementById('display-name').innerText = n;
            document.getElementById('display-reg').innerText = r;
            loadQuestion(); drawGrid();
            interval = setInterval(() => {
                timer--;
                let m = Math.floor(timer/60); let s = timer%60;
                document.getElementById('timer-clock').innerText = `${m}:${s<10?'0'+s:s}`;
                if(timer <= 0) finalize();
            }, 1000);
        }

        function loadQuestion() {
            const q = questions[index];
            document.getElementById('q-number').innerText = index + 1;
            document.getElementById('q-content').innerText = q.q;
            document.getElementById('options-area').innerHTML = q.a.map((opt, i) => `
                <button onclick="handleSelect(${i})" class="opt-btn p-5 rounded-2xl text-left flex items-center gap-4 ${selections[index]===i?'opt-active':''}">
                    <span class="w-10 h-10 flex items-center justify-center rounded-xl border font-black">${String.fromCharCode(65+i)}</span>
                    <span class="text-lg">${opt}</span>
                </button>
            `).join('');
        }

        function handleSelect(i) { selections[index] = i; loadQuestion(); drawGrid(); }
        function drawGrid() {
            document.getElementById('nav-map').innerHTML = questions.map((_, i) => `
                <button onclick="jumpTo(${i})" class="h-12 w-full rounded-xl font-bold border-2 ${index===i?'status-now':(selections[i]!==null?'status-done':'bg-slate-800')}">${i+1}</button>
            `).join('');
        }
        function jumpTo(i) { index = i; loadQuestion(); drawGrid(); }
        function moveNext() { if(index<49) jumpTo(index+1); }
        function movePrev() { if(index>0) jumpTo(index-1); }
        function finishProcess() { if(confirm("Submit Exam?")) finalize(); }
        
        function finalize() {
            clearInterval(interval);
            let score = 0;
            let reviewHtml = "";
            questions.forEach((q, i) => {
                const isCorrect = selections[i] === q.c;
                if(isCorrect) score++;
                reviewHtml += `
                    <div class="p-5 bg-slate-800 rounded-2xl border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="font-bold text-white mb-2">${i+1}. ${q.q}</p>
                        <p class="text-sm text-emerald-400">Correct: ${q.a[q.c]}</p>
                        <p class="text-xs text-slate-500">You selected: ${selections[i] !== null ? q.a[selections[i]] : 'No answer'}</p>
                    </div>`;
            });
            document.getElementById('exam-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('score-val').innerText = `${score}/50`;
            document.getElementById('review-scroll').innerHTML = reviewHtml;
        }
    </script>
</body>
</html>
